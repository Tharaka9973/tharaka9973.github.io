<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Auth System</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.container{width:100%;max-width:400px;background:#1e293b;padding:25px;border-radius:20px}
input{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#38bdf8;color:#000;font-weight:bold;cursor:pointer}
button:hover{background:#22c55e}
.link{color:#38bdf8;cursor:pointer;text-align:center;margin-top:10px}
.error{color:red;font-size:13px}
.success{color:lightgreen;font-size:13px}
.hidden{display:none}
</style>
</head>
<body>

<div class="container" id="authBox">

<h2 id="title">Sign Up</h2>

<div id="msg"></div>

<input type="text" id="username" placeholder="Username">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirm" placeholder="Confirm Password">

<button onclick="signup()" id="signupBtn">Sign Up</button>
<button onclick="signin()" id="signinBtn" class="hidden">Sign In</button>

<div class="link" onclick="toggleMode()" id="toggleText">Already have account? Sign In</div>

</div>

<div class="container hidden" id="homeBox">
<h2>Welcome <span id="userDisplay"></span> 👋</h2>
<p id="emailDisplay"></p>
<button onclick="logout()">Logout</button>
</div>

<script>
let mode="signup";

function getUsers(){return JSON.parse(localStorage.getItem("users")||"[]")}
function saveUsers(u){localStorage.setItem("users",JSON.stringify(u))}
function setSession(u){localStorage.setItem("session",JSON.stringify(u))}
function getSession(){return JSON.parse(localStorage.getItem("session"))}

function showMsg(text,type){
let m=document.getElementById("msg");
m.innerHTML=text;
m.className=type;
}

function validateEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)}
function validatePassword(p){return /(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[^A-Za-z0-9]).{8,}/.test(p)}

function signup(){
let u=document.getElementById("username").value.trim();
let e=document.getElementById("email").value.trim().toLowerCase();
let p=document.getElementById("password").value;
let c=document.getElementById("confirm").value;

if(!u||!e||!p||!c){showMsg("Fill all fields","error");return}
if(!validateEmail(e)){showMsg("Invalid email","error");return}
if(!validatePassword(p)){showMsg("Weak password","error");return}
if(p!==c){showMsg("Passwords not match","error");return}

let users=getUsers();
if(users.find(x=>x.email===e)){showMsg("Email already used","error");return}
if(users.find(x=>x.username.toLowerCase()===u.toLowerCase())){showMsg("Username taken","error");return}

let newUser={username:u,email:e,password:p};
users.push(newUser);
saveUsers(users);
setSession(newUser);
showHome(newUser);
}

function signin(){
let e=document.getElementById("email").value.trim().toLowerCase();
let p=document.getElementById("password").value;

let users=getUsers();
let user=users.find(x=>x.email===e&&x.password===p);
if(!user){showMsg("Invalid login","error");return}

setSession(user);
showHome(user);
}

function showHome(user){
document.getElementById("authBox").classList.add("hidden");
document.getElementById("homeBox").classList.remove("hidden");
document.getElementById("userDisplay").innerText=user.username;
document.getElementById("emailDisplay").innerText=user.email;
}

function logout(){localStorage.removeItem("session");location.reload()}

function toggleMode(){
mode = mode === "signup" ? "signin" : "signup";

document.getElementById("title").innerText = mode === "signup" ? "Sign Up" : "Sign In";
document.getElementById("signupBtn").classList.toggle("hidden", mode !== "signup");
document.getElementById("signinBtn").classList.toggle("hidden", mode !== "signin");
document.getElementById("confirm").classList.toggle("hidden", mode !== "signup");
document.getElementById("username").classList.toggle("hidden", mode !== "signup");
document.getElementById("toggleText").innerText = mode === "signup" ? "Already have account? Sign In" : "No account? Sign Up";

showMsg("","");
}

window.onload=function(){
let s=getSession();
if(s) showHome(s);
}
</script>

</body>
</html>

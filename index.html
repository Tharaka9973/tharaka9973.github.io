<!DOCTYPE html>
<html>
<head>
  <title>Game Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      background: #1e293b;
      padding: 15px;
      font-size: 22px;
    }

    nav {
      background: #334155;
      padding: 10px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      margin-top: 40px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: #facc15;
      cursor: pointer;
    }

    button:hover {
      background: orange;
    }

    footer {
      margin-top: 50px;
      padding: 15px;
      background: #1e293b;
    }
  </style>
</head>

<body>

<header>🎮 Game Hub</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
</nav>

<div class="container">
  <h2>Click Game 🔥</h2>
  <h3 id="score">Score: 0</h3>
  <button onclick="playGame()">PLAY</button>
</div>

<footer>
  © 2026 Game Hub | All Rights Reserved
</footer>

<script>
  let score = 0;

  function playGame() {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
  }
</script>

</body>
</html>
